# Ruta del proyecto con caracteres no ASCII (p. ej. "Programación", "Profundización") en Windows.
# Ver https://issuetracker.google.com/issues/95744
android.overridePathCheck=true
# Incluir la propia clave silencia también el aviso de que esta lista es experimental (patrón AndroidX).
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings,android.overridePathCheck